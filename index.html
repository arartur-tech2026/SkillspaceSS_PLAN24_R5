<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Интеллект-карта – План ЕГЭ</title>
  <style>
    /* --- БАЗОВЫЕ ПЕРЕМЕННЫЕ И ТЕМЫ --- */
    :root {
      --bg-main: #f8fafc;
      --bg-surface: #ffffff;
      --bg-splash: #ffffff;
      --bg-bank: #f1f5f9;
      --text-main: #0f172a;
      --text-muted: #475569;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --success: #10b981;
      --success-bg: #d1fae5;
      --error: #ef4444;
      --error-bg: #fee2e2;
      --border: #e2e8f0;
      --line-color: #cbd5e1;
      
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-top: 0 -4px 10px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
    }

    [data-theme="dark"] {
      --bg-main: #0f172a;
      --bg-surface: #1e293b;
      --bg-splash: #0f172a;
      --bg-bank: #0f172a;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --success: #10b981;
      --success-bg: rgba(16, 185, 129, 0.15);
      --error: #ef4444;
      --error-bg: rgba(239, 68, 68, 0.15);
      --border: #334155;
      --line-color: #475569;
      
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
      --shadow-top: 0 -4px 10px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      line-height: 1.4;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    svg {
      width: 1.25rem;
      height: 1.25rem;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* --- СТАРТОВЫЙ ЭКРАН --- */
    #splash-screen {
      position: fixed;
      inset: 0;
      background-color: var(--bg-splash);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 2rem;
      text-align: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #splash-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .splash-icon {
      width: 80px;
      height: 80px;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }
    .splash-title {
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      font-weight: 800;
      margin-bottom: 1rem;
      word-break: break-word;
      hyphens: auto;
    }
    .splash-desc {
      font-size: clamp(0.95rem, 3vw, 1.1rem);
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      max-width: 500px;
      line-height: 1.5;
    }
    .btn-start {
      background-color: var(--accent);
      color: #ffffff;
      border: none;
      padding: 1rem 3rem;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 99px;
      cursor: pointer;
      box-shadow: var(--shadow-md);
      animation: pulse 2s infinite;
      transition: transform 0.2s ease;
    }
    .btn-start:active { transform: scale(0.95); }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); }
      70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
    }

    [data-theme="dark"] .btn-start { animation: pulse-dark 2s infinite; }
    @keyframes pulse-dark {
      0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
      70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
      100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
    }

    /* --- ОСНОВНОЙ ИНТЕРФЕЙС --- */
    #app-ui {
      display: flex;
      flex-direction: column;
      height: 100%;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease 0.2s, visibility 0.5s ease 0.2s;
    }
    #app-ui.visible {
      opacity: 1;
      visibility: visible;
    }

    /* Шапка */
    .header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top, 15px) 15px 10px;
      background-color: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .header-title-box {
      flex: 1;
      min-width: 0;
      margin-right: 10px;
    }
    .header-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 600;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-controls {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .btn-icon {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-main);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
    }
    .btn-icon:active { transform: scale(0.9); }
    .btn-blue {
      background-color: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-blue svg { stroke: #fff; fill: none; }
    
    .btn-nav-plan {
      background-color: var(--accent-soft);
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Инструкция и переключатель режима */
    .instruction-bar {
      background-color: var(--accent-soft);
      color: var(--accent);
      padding: 10px 15px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transition: padding 0.3s ease;
    }
    .instruction-bar.compact {
      padding: 6px 15px;
      justify-content: center;
    }
    
    .instruction-text {
      flex: 1;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: left;
      transition: opacity 0.3s ease, max-height 0.3s ease, margin 0.3s ease;
      max-height: 50px;
      overflow: hidden;
      opacity: 1;
    }
    .instruction-text.hidden {
      display: none; 
    }
    
    .mode-toggle {
      display: inline-flex;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 99px;
      padding: 3px;
      flex-shrink: 0;
      margin: 0 auto;
    }
    [data-theme="dark"] .mode-toggle {
      background: rgba(0, 0, 0, 0.3);
    }
    .mode-btn {
      padding: 4px 12px;
      font-size: 0.8rem;
      font-weight: 700;
      border-radius: 99px;
      cursor: pointer;
      color: var(--accent);
      transition: all 0.2s;
      user-select: none;
    }
    .mode-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: var(--shadow-sm);
    }

    @media (max-width: 500px) {
      .instruction-bar:not(.compact) {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
      }
      .instruction-text {
        text-align: center;
      }
      .mode-toggle {
        justify-content: center;
        align-self: center;
      }
    }

    /* --- РАБОЧАЯ ЗОНА: ДЕРЕВО ПЛАНА --- */
    .workspace {
      flex: 1;
      overflow-y: auto;
      padding: 20px 15px 40px;
      -webkit-overflow-scrolling: touch;
      position: relative;
    }

    .tree-root {
      background-color: var(--text-main);
      color: var(--bg-surface);
      padding: 12px 20px;
      border-radius: var(--radius-md);
      font-weight: 800;
      font-size: 1.1rem;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-md);
      position: relative;
      z-index: 2;
    }

    /* Кнопки справки (Tooltips) */
    .info-toggle {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: inherit;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .tree-root .info-toggle { color: var(--bg-surface); }
    .category-title .info-toggle { background: var(--accent-soft); color: var(--accent); }
    .slot-content .info-toggle { background: var(--accent-soft); color: var(--accent); margin-left: 10px; }
    
    .info-toggle:hover, .info-toggle:active {
      transform: scale(1.1);
      background: var(--accent);
      color: #fff;
    }
    .info-toggle svg { width: 16px; height: 16px; }

    /* Панель с текстом справки */
    .info-panel {
      display: none;
      background-color: var(--bg-surface);
      color: var(--text-main);
      padding: 14px 20px;
      font-size: 0.95rem;
      border-radius: var(--radius-md);
      margin-bottom: 15px;
      border-left: 4px solid var(--accent);
      box-shadow: var(--shadow-lg);
      animation: fadeInDown 0.2s ease;
      max-width: 600px;
      line-height: 1.5;
    }
    .info-panel.active { display: block; }
    .info-panel.root-info { margin-left: 20px; background-color: var(--accent-soft); }
    .tree-category .info-panel { margin-left: 25px; position: relative; z-index: 2; }
    .category-title-wrapper .info-panel { margin-left: 0; margin-top: 5px; }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .tree-container {
      position: relative;
      margin-left: 20px;
      padding-left: 20px;
      border-left: 2px solid var(--line-color);
    }

    .tree-category {
      position: relative;
      margin-bottom: 25px;
    }
    .tree-category::before {
      content: '';
      position: absolute;
      left: -20px;
      top: 15px;
      width: 20px;
      height: 2px;
      background-color: var(--line-color);
    }

    /* Маскировка лишних "хвостов" вертикальных линий */
    .tree-category:last-child::after {
      content: '';
      position: absolute;
      left: -22px;
      top: 17px;
      bottom: -200px;
      width: 6px;
      background-color: var(--bg-main);
    }
    
    .slot-wrapper:last-child::after {
      content: '';
      position: absolute;
      left: -27px;
      top: calc(50% + 1px);
      bottom: -100px;
      width: 6px;
      background-color: var(--bg-main);
    }

    .category-title {
      background-color: var(--bg-surface);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: var(--radius-md);
      font-weight: 700;
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      color: var(--text-main);
      box-shadow: var(--shadow-sm);
    }

    .category-title-wrapper {
      position: relative;
      z-index: 2;
      margin-bottom: 10px;
    }

    .slots-container {
      padding-left: 25px;
      position: relative;
      border-left: 2px solid var(--line-color);
      margin-left: 15px;
    }

    .slot-wrapper {
      position: relative;
      margin-bottom: 8px;
    }
    .slot-wrapper::before {
      content: '';
      position: absolute;
      left: -25px;
      top: 50%;
      width: 25px;
      height: 2px;
      background-color: var(--line-color);
    }

    .tree-category:last-child > .slots-container { border-left: none; }
    .tree-category:last-child > .slots-container .slot-wrapper::after {
      content: '';
      position: absolute;
      left: -27px;
      bottom: 50%;
      width: 4px;
      height: 100%;
      background-color: var(--bg-main); 
      z-index: -1;
    }

    /* Сами слоты */
    .slot {
      background-color: transparent;
      border: 2px dashed var(--text-muted);
      border-radius: var(--radius-sm);
      padding: 10px 15px;
      font-size: 0.95rem;
      color: var(--text-muted);
      min-height: 44px;
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s ease;
      word-break: break-word;
      user-select: none;
    }
    
    /* Слот 1-го уровня (для Сложного режима) */
    .category-slot {
      background-color: var(--bg-main);
      border: 2px dashed var(--accent);
      font-weight: 700;
      color: var(--accent);
    }

    .slot-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .slot.highlight {
      border-color: var(--accent);
      background-color: var(--accent-soft);
      transform: scale(1.02);
    }

    .slot.filled {
      background-color: var(--bg-surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--success);
      color: var(--text-main);
      font-weight: 600;
      box-shadow: var(--shadow-sm);
      flex-direction: column;
      align-items: stretch;
      padding: 8px 15px;
    }
    
    /* Заполненный слот 1-го уровня визуально маскируется под заголовок */
    .slot.filled.category-slot-filled {
      border-left: 1px solid var(--border);
      background-color: var(--bg-surface);
      border-radius: var(--radius-md);
    }

    .slot.error-anim {
      animation: shake 0.4s ease;
      background-color: var(--error-bg);
      border-color: var(--error);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-5px); }
      40%, 80% { transform: translateX(5px); }
    }

    /* --- БАНК ТЕРМИНОВ (НИЖНЯЯ ПАНЕЛЬ) --- */
    .bank-panel {
      flex-shrink: 0;
      height: 35vh;
      min-height: 200px;
      background-color: var(--bg-bank);
      border-top: 1px solid var(--border);
      box-shadow: var(--shadow-top);
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom, 0);
      z-index: 20;
    }

    .bank-header {
      padding: 12px 15px;
      font-size: 0.85rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .bank-items {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }

    .term-item {
      background-color: var(--bg-surface);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-main);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
      user-select: none;
    }

    .term-item:active { transform: scale(0.95); }

    .term-item.selected {
      background-color: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
      transform: translateY(-2px);
    }

    .victory-msg {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: var(--success);
      padding: 20px;
    }
    .victory-msg svg { width: 48px; height: 48px; margin-bottom: 10px; }
    .victory-msg h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 15px; }
    
    .btn-next-victory {
      background-color: var(--success);
      color: #fff;
      border: none;
      padding: 10px 24px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 99px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s;
    }
    .btn-next-victory:active { transform: scale(0.95); }

  </style>
</head>
<body>

    </defs>
  </svg>

  <!-- СТАРТОВЫЙ ЭКРАН -->
  <div id="splash-screen">
    <svg class="splash-icon"><use href="#icon-map"></use></svg>
    <h1 class="splash-title">РАЗДЕЛ 5: ПРАВО</h1>
    <p class="splash-desc">Интеллект-карта. Выберите термин в банке снизу и нажмите на подходящее пустое место в схеме.</p>
    <button class="btn-start" id="btn-start">Начать изучение</button>

              { text: "состязательность и равноправие сторон и др.", desc: "прокурор и адвокат имеют абсолютно равные права в суде; судья лишь слушает их аргументы и выносит решение." }

            items: [

              { text: "международное экологическое право", desc: "договоры государств о совместной борьбе с глобальным потеплением, защите океанов и озонового слоя." },

          {

            type: "interactive",
            items: [
              { text: "суверенное равенство государств", desc: "огромные США или Китай юридически абсолютно равны крошечным странам; у каждого государства есть один голос в ООН." },
              { text: "неприменение силы или угрозы силой", desc: "категорический запрет на развязывание агрессивных войн; война признается международным преступлением." },
              { text: "нерушимость государственных границ", desc: "запрет на насильственный захват чужих территорий; границы могут меняться только по мирному договору." },
              { text: "мирное разрешение международных споров и др.", desc: "государства обязаны решать все конфликты за столом переговоров или в Международном суде, а не на поле боя." }
            ]
          },
          {
            title: "4. Международное гуманитарное право:",
            desc: "«Законы войны» (Женевские конвенции), ограничивающие жестокость даже во время боевых действий.",
            type: "interactive",
            items: [
              { text: "правила ведения военных действий (запрет на использование определенных видов оружия и др.)", desc: "строгий запрет на применение химического, биологического (бактериологического) оружия и ядов, вызывающих чрезмерные страдания." },
              { text: "защита жертв войны (раненых, военнопленных)", desc: "пленных солдат запрещено пытать, убивать или унижать; раненых врагов обязаны лечить так же, как своих." },
              { text: "защита гражданского населения и др.", desc: "категорический запрет на бомбардировки мирных городов, жилых домов, больниц и уничтожение запасов воды и пищи." }
            ]
          }
        ]
      }
    ];

    // --- ЛОГИКА ИНТЕРФЕЙСА ---
    const htmlEl = document.documentElement;
    const splashScreen = document.getElementById('splash-screen');
    const appUi = document.getElementById('app-ui');
    const btnStart = document.getElementById('btn-start');
    const btnTheme = document.getElementById('btn-theme');
    const btnFullscreen = document.getElementById('btn-fullscreen');
    
    // Кнопки навигации
    const btnSkipPlan = document.getElementById('btn-skip-plan');
    const btnPrevPlan = document.getElementById('btn-prev-plan');
    const btnNextVictory = document.getElementById('btn-next-victory');
    
    const workspaceContainer = document.getElementById('workspace');
    const bankContainer = document.getElementById('bank-items');
    const termsLeftEl = document.getElementById('terms-left');
    const victoryMsg = document.getElementById('victory-msg');
    const instruction = document.getElementById('instruction');
    const subtitleEl = document.getElementById('header-subtitle');

    let currentTheme = 'light';
    let currentMode = 'easy'; // 'easy' - только подпункты, 'hard' - 1 и 2 уровень
    let currentPlanIndex = 0;
    let bankTerms = [];
    let selectedTermId = null;
    let audioCtx = null;
    let hasInteracted = false;

    // Аудио движок (Приятный "Дзинь")
    function initAudio() {
      if (!audioCtx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (AudioContext) audioCtx = new AudioContext();
      }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSuccessSound() {
      if (!audioCtx) return;
      try {
        const playBell = (freq, delay) => {
          const osc = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          
          gainNode.gain.setValueAtTime(0, audioCtx.currentTime + delay);
          gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + delay + 0.02);
          gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + 0.6);
          
          osc.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          
          osc.start(audioCtx.currentTime + delay);
          osc.stop(audioCtx.currentTime + delay + 0.6);
        };
        
        playBell(1046.50, 0); // Нота C6
        playBell(1318.51, 0); // Нота E6
      } catch(e) { console.warn("Audio error", e); }
    }

    window.toggleInfo = function(id) {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('active');
    };

    // Переключение режимов
    document.getElementById('mode-easy').addEventListener('click', () => {
       if (currentMode === 'easy') return;
       currentMode = 'easy';
       document.getElementById('mode-easy').classList.add('active');
       document.getElementById('mode-hard').classList.remove('active');
       loadPlan(currentPlanIndex);
    });

    document.getElementById('mode-hard').addEventListener('click', () => {
       if (currentMode === 'hard') return;
       currentMode = 'hard';
       document.getElementById('mode-hard').classList.add('active');
       document.getElementById('mode-easy').classList.remove('active');
       loadPlan(currentPlanIndex);
    });

    // --- ГЕНЕРАЦИЯ ПЛАНА ---
    function loadPlan(index) {
      const plan = allPlans[index];
      
      subtitleEl.textContent = `План ${index + 1} из ${allPlans.length}: ${plan.title}`;
      
      let wsHTML = `
        <div class="tree-root">
          ${plan.title}
          <button class="info-toggle" onclick="toggleInfo('info-main')" title="Что это?">
            <svg><use href="#icon-info"></use></svg>
          </button>
        </div>
        <div class="info-panel root-info" id="info-main">${plan.titleDesc}</div>
        <div class="tree-container">
      `;

      bankTerms = [];
      let termIdCounter = 1; // Защита от бага нуля

      plan.categories.forEach((cat, catIndex) => {
        const catId = `cat-${index}-${catIndex}`;
        const catRootId = `root-${index}-${catIndex}`;
        
        wsHTML += `<div class="tree-category">`;

        // В сложном режиме ВСЕ пункты первого уровня становятся слотами
        if (currentMode === 'hard') {
            let cleanTitle = cat.title.replace(/^\d+\.\s*/, '').replace(/[:.]$/, '');
            // Переводим первую букву в строчную
            cleanTitle = cleanTitle.charAt(0).toLowerCase() + cleanTitle.slice(1);
            
            const tId = termIdCounter++;
            
            bankTerms.push({
                id: tId,
                cat: catRootId,
                text: cleanTitle,
                desc: cat.desc || '',
                fullTitle: cat.title,
                isLevel1: true
            });
            
            wsHTML += `
              <div class="category-title-wrapper">
                <div class="slot category-slot" data-cat="${catRootId}" data-filled="false">Пункт 1 уровня</div>
              </div>
            `;
        } else {
            // В легком режиме пункты 1 уровня отображаются статично
            wsHTML += `
              <div class="category-title">
                ${cat.title}
                ${cat.desc ? `<button class="info-toggle" onclick="toggleInfo('info-${catId}')" title="Справка"><svg><use href="#icon-info"></use></svg></button>` : ''}
              </div>
              ${cat.desc ? `<div class="info-panel" id="info-${catId}">${cat.desc}</div>` : ''}
            `;
        }

        // Подпункты всегда генерируются как слоты (если они есть)
        if (cat.type === 'interactive' && cat.items) {
          wsHTML += `<div class="slots-container">`;
          cat.items.forEach(item => {
            const tId = termIdCounter++;
            bankTerms.push({
              id: tId,
              cat: catId,
              text: item.text,
              desc: item.desc,
              isLevel1: false
            });
            wsHTML += `
              <div class="slot-wrapper">
                <div class="slot" data-cat="${catId}" data-filled="false">Подпункт</div>
              </div>
            `;
          });
          wsHTML += `</div>`;
        }
        wsHTML += `</div>`;
      });

      wsHTML += `</div>`;
      workspaceContainer.innerHTML = wsHTML;

      // Перемешиваем банк
      bankTerms.sort(() => Math.random() - 0.5);
      
      // Сброс UI (Инструкция остается скрытой, если пользователь уже взаимодействовал)
      selectedTermId = null;
      victoryMsg.style.display = 'none';
      bankContainer.style.display = 'flex';

      renderBank();
      bindSlotEvents();
    }

    // Навигация по планам
    function loadNextPlan() {
      currentPlanIndex = (currentPlanIndex + 1) % allPlans.length;
      loadPlan(currentPlanIndex);
    }
    
    function loadPrevPlan() {
      currentPlanIndex = (currentPlanIndex - 1 + allPlans.length) % allPlans.length;
      loadPlan(currentPlanIndex);
    }

    btnSkipPlan.addEventListener('click', () => {
      initAudio();
      loadNextPlan();
    });

    btnPrevPlan.addEventListener('click', () => {
      initAudio();
      loadPrevPlan();
    });

    btnNextVictory.addEventListener('click', () => {
      loadNextPlan();
    });

    // --- ЛОГИКА ИГРЫ ---
    function renderBank() {
      bankContainer.innerHTML = '';
      termsLeftEl.textContent = bankTerms.length;

      if (bankTerms.length === 0) {
        bankContainer.style.display = 'none';
        victoryMsg.style.display = 'flex';
        return;
      }

      bankTerms.forEach(term => {
        const div = document.createElement('div');
        div.className = `term-item ${selectedTermId === term.id ? 'selected' : ''}`;
        div.textContent = term.text;
        div.dataset.id = term.id;
        div.addEventListener('click', () => selectTerm(term.id));
        bankContainer.appendChild(div);
      });
    }

    function selectTerm(id) {
      if (!hasInteracted) {
        hasInteracted = true;
        document.getElementById('instruction').classList.add('hidden');
        document.getElementById('instruction-bar').classList.add('compact');
      }

      if (selectedTermId === id) {
        selectedTermId = null;
      } else {
        selectedTermId = id;
      }
      
      renderBank();
      
      const slots = document.querySelectorAll('.slot');
      slots.forEach(slot => {
        if (slot.dataset.filled === "false") {
          slot.classList.toggle('highlight', selectedTermId !== null);
        }
      });
    }

    function bindSlotEvents() {
      const slots = document.querySelectorAll('.slot');
      slots.forEach(slot => {
        slot.addEventListener('click', () => {
          if (!hasInteracted) {
            hasInteracted = true;
            document.getElementById('instruction').classList.add('hidden');
            document.getElementById('instruction-bar').classList.add('compact');
          }

          // Возврат в банк
          if (slot.dataset.filled === "true") {
            const returnedTerm = {
              id: parseInt(slot.dataset.termId),
              cat: slot.dataset.cat,
              text: slot.dataset.originalText,
              desc: slot.dataset.desc,
              fullTitle: slot.dataset.fullTitle,
              isLevel1: slot.dataset.isLevel1 === "true"
            };
            bankTerms.push(returnedTerm);
            
            slot.dataset.filled = "false";
            slot.dataset.termId = "";
            slot.dataset.desc = "";
            slot.dataset.originalText = "";
            slot.dataset.fullTitle = "";
            slot.dataset.isLevel1 = "";
            
            const isLevel1Slot = slot.classList.contains('category-slot');
            slot.textContent = isLevel1Slot ? "Пункт 1 уровня" : "Подпункт";
            slot.className = isLevel1Slot ? "slot category-slot" : "slot"; 
            
            const panel = slot.parentNode.querySelector('.info-panel');
            if (panel) panel.remove();
            
            renderBank();
            if(navigator.vibrate) navigator.vibrate(20);
            return;
          }

          if (selectedTermId === null) return;

          const termObj = bankTerms.find(t => t.id === selectedTermId);
          
          if (slot.dataset.cat === termObj.cat) {
            // УСПЕХ
            slot.dataset.originalText = termObj.text;
            slot.dataset.fullTitle = termObj.fullTitle || "";
            slot.dataset.isLevel1 = termObj.isLevel1 || false;
            
            if (termObj.isLevel1) {
              slot.innerHTML = `
                <div class="slot-content">
                  <span class="slot-text">${termObj.fullTitle}</span>
                  ${termObj.desc ? `<button class="info-toggle" title="Посмотреть определение"><svg><use href="#icon-info"></use></svg></button>` : ''}
                </div>
              `;
              slot.className = "slot filled category-slot-filled"; 
            } else {
              slot.innerHTML = `
                <div class="slot-content">
                  <span class="slot-text">${termObj.text}</span>
                  ${termObj.desc ? `<button class="info-toggle" title="Посмотреть определение"><svg><use href="#icon-info"></use></svg></button>` : ''}
                </div>
              `;
              slot.className = "slot filled"; 
            }
            
            slot.dataset.filled = "true";
            slot.dataset.termId = termObj.id;
            slot.dataset.desc = termObj.desc;
            
            if (termObj.desc) {
              const infoPanel = document.createElement('div');
              infoPanel.className = 'info-panel';
              infoPanel.textContent = termObj.desc;
              slot.parentNode.appendChild(infoPanel);

              const btnInfo = slot.querySelector('.info-toggle');
              if(btnInfo) {
                btnInfo.addEventListener('click', (e) => {
                  e.stopPropagation();
                  infoPanel.classList.toggle('active');
                });
              }
            }

            playSuccessSound();
            if (navigator.vibrate) navigator.vibrate(30);
            
            bankTerms = bankTerms.filter(t => t.id !== selectedTermId);
            selectedTermId = null;
            
            slots.forEach(s => s.classList.remove('highlight'));
            renderBank();
          } else {
            // ОШИБКА
            slot.classList.remove('highlight');
            slot.classList.remove('error-anim');
            void slot.offsetWidth; 
            slot.classList.add('error-anim');
            if(navigator.vibrate) navigator.vibrate([50, 100]); 
          }
        });
      });
    }

    // --- СИСТЕМНЫЕ ФУНКЦИИ ---
    function requestFullScreenSafe() {
      try {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          // Безопасный вызов полноэкранного режима, исключающий падение в Safari/iOS
          if (htmlEl.requestFullscreen) {
            const req = htmlEl.requestFullscreen();
            if (req && typeof req.catch === 'function') req.catch(() => {});
          } else if (htmlEl.webkitRequestFullscreen) {
            htmlEl.webkitRequestFullscreen(); 
          }
        }
      } catch (e) {
        console.warn("Fullscreen API не поддерживается:", e);
      }
    }

    function toggleFullScreen() {
      try {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) requestFullScreenSafe();
        else {
          if (document.exitFullscreen) document.exitFullscreen();
          else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
      } catch (e) {}
    }

    btnStart.addEventListener('click', () => {
      try {
        initAudio();
        requestFullScreenSafe();
      } catch (e) {
        console.error("Ошибка инициализации:", e);
      }
      
      splashScreen.classList.add('hidden');
      setTimeout(() => {
        splashScreen.style.display = 'none';
        appUi.classList.add('visible');
        loadPlan(currentPlanIndex);
      }, 500);
    });

    btnFullscreen.addEventListener('click', toggleFullScreen);

    const updateFullscreenIcon = () => {
      const isFull = document.fullscreenElement || document.webkitFullscreenElement;
      document.getElementById('icon-fullscreen-use').setAttribute('href', isFull ? '#icon-minimize' : '#icon-maximize');
    };
    document.addEventListener('fullscreenchange', updateFullscreenIcon);
    document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);

    btnTheme.addEventListener('click', () => {
      currentTheme = currentTheme === 'light' ? 'dark' : 'light';
      htmlEl.setAttribute('data-theme', currentTheme);
      document.getElementById('icon-theme-use').setAttribute('href', currentTheme === 'light' ? '#icon-moon' : '#icon-sun');
    });

  </script>
</body>
